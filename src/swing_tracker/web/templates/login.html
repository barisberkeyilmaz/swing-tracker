<!DOCTYPE html>
<html lang="tr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giris - Swing Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        surface: { DEFAULT: '#121212', raised: '#1a1a1a', sunken: '#0a0a0a' },
                        border: { DEFAULT: '#2e2e2e', subtle: '#1f1f1f' },
                        accent: { DEFAULT: '#e5a84b', hover: '#dba040', muted: 'rgba(229,168,75,0.12)' },
                        negative: { DEFAULT: '#ef5350', muted: 'rgba(239,83,80,0.12)' },
                        txt: { primary: '#ededec', secondary: '#a0a0a0', muted: '#6e6e6e', ghost: '#4a4a4a' },
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="h-full bg-surface text-txt-primary flex items-center justify-center">
    <div class="w-full max-w-sm mx-4">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight">
                Swing<span class="text-accent">Tracker</span>
            </h1>
            <p class="text-txt-muted text-sm mt-1">Dashboard erisimi</p>
        </div>

        <div class="bg-surface-raised border border-border rounded-xl p-6">
            {% if error %}
            <div class="mb-4 px-3 py-2 rounded-lg bg-negative-muted border border-negative/20 text-negative text-sm">
                {{ error }}
            </div>
            {% endif %}

            <form method="post" action="/login">
                <label class="block text-sm font-medium text-txt-secondary mb-1.5" for="password">
                    Sifre
                </label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autofocus
                    class="w-full px-3 py-2 rounded-lg bg-surface-sunken text-txt-primary border border-border
                           focus:border-accent focus:ring-1 focus:ring-accent/30 focus:outline-none
                           placeholder-txt-ghost"
                    placeholder="Dashboard sifresi">

                <button type="submit"
                    class="w-full mt-4 px-4 py-2.5 rounded-lg bg-accent hover:bg-accent-hover
                           text-surface font-semibold text-sm transition-colors">
                    Giris Yap
                </button>
            </form>
        </div>
    </div>
</body>
</html>
