{% if etfs %}
<div class="overflow-x-auto">
    <table class="w-full text-sm">
        <thead>
            <tr class="text-left text-xs text-gray-500 uppercase border-b border-gray-700/30">
                <th class="px-5 py-3">ETF</th>
                <th class="px-3 py-3">Ihracici</th>
                <th class="px-3 py-3 text-right">Agirlik</th>
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-700/20">
            {% for etf in etfs %}
            <tr class="hover:bg-white/[0.02]">
                <td class="px-5 py-2.5">
                    <p class="text-white text-xs font-medium">{{ etf.symbol }}</p>
                    <p class="text-gray-500 text-xs truncate max-w-[200px]" title="{{ etf.name }}">{{ etf.name }}</p>
                </td>
                <td class="px-3 py-2.5 text-gray-400 text-xs">{{ etf.issuer }}</td>
                <td class="px-3 py-2.5 text-right text-white text-xs">
                    {% if etf.weight %}%{{ "%.4f"|format(etf.weight) }}{% else %}-{% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<div class="px-5 py-6 text-center text-gray-500 text-sm">ETF verisi bulunamadi</div>
{% endif %}
